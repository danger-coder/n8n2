services:
  - type: web
    name: n8n
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon

    envVars:
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 10000
      - key: N8N_PROTOCOL
        value: https
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_URL
        sync: false          # set to your Render public URL after first deploy
      - key: N8N_ENCRYPTION_KEY
        generateValue: true  # auto-generated, store it safely
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        sync: false          # Neon DIRECT host (no -pooler): e.g. ep-xxx.c-2.us-east-1.aws.neon.tech
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        value: neondb
      - key: DB_POSTGRESDB_USER
        sync: false          # from Neon dashboard
      - key: DB_POSTGRESDB_PASSWORD
        sync: false          # from Neon dashboard
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: DB_POSTGRESDB_CONNECTION_TIMEOUT
        value: 120

    healthCheckPath: /healthz
